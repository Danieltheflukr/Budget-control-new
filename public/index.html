<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxBudget | Daniel & Jacky</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1c2c 0%, #4a192c 100%); min-height: 100vh; color: #fff; }
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; }
        .gradient-text { background: linear-gradient(90deg, #00f2fe 0%, #4facfe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-premium { background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); transition: transform 0.2s; }
        .btn-premium:active { transform: scale(0.95); }
        .list-item { transition: background 0.3s; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .list-item:hover { background: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold gradient-text">LuxBudget</h1>
                <p class="text-gray-400 text-sm">Welcome back, Daniel</p>
            </div>
            <div class="w-12 h-12 glass flex items-center justify-center rounded-full">
                <i class="fa-solid fa-crown text-yellow-500"></i>
            </div>
        </header>

        <div class="glass p-6 mb-8 relative overflow-hidden">
            <div class="absolute -right-4 -top-4 opacity-10 text-8xl"><i class="fa-solid fa-wallet"></i></div>
            <h2 class="text-gray-300 text-sm mb-1 uppercase tracking-wider">Total Shared Savings</h2>
            <div class="text-4xl font-bold mb-4" id="total-savings">$0</div>
            <div class="w-full bg-gray-800 rounded-full h-2 mb-2">
                <div id="save-progress" class="btn-premium h-2 rounded-full" style="width: 0%"></div>
            </div>
            <p class="text-xs text-gray-400">Target: $1,000,000 (0.0%)</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="glass p-4 text-center">
                <i class="fa-solid fa-arrow-up-right-from-square text-cyan-400 mb-2"></i>
                <span class="block text-xs text-gray-400">Status</span>
                <span class="font-semibold text-sm" id="balance-msg">Calculating...</span>
            </div>
            <div class="glass p-4 text-center" onclick="openModal()">
                <i class="fa-solid fa-plus text-cyan-400 mb-2"></i>
                <span class="block text-xs text-gray-400">Action</span>
                <span class="font-semibold text-sm">Add New</span>
            </div>
        </div>

        <div class="glass p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold">Transaction History</h3>
                <i class="fa-solid fa-sliders text-gray-400"></i>
            </div>
            <div id="history-list" class="space-y-1">
                </div>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm hidden flex items-center justify-center p-4 z-50">
        <div class="glass w-full max-w-sm p-8 relative">
            <button onclick="closeModal()" class="absolute right-4 top-4 text-gray-400"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="text-2xl font-bold mb-6 gradient-text">Add Record</h2>
            <form id="recordForm" class="space-y-4">
                <input type="text" id="desc" placeholder="Description" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 focus:outline-none focus:border-cyan-400" required>
                <input type="number" id="amount" placeholder="Amount" class="w-full bg-white/5 border border-white/10 rounded-xl p-3 focus:outline-none focus:border-cyan-400" required>
                <div class="flex gap-2">
                    <select id="payer" class="flex-1 bg-white/5 border border-white/10 rounded-xl p-3 text-gray-300">
                        <option value="Daniel">Payer: Daniel</option>
                        <option value="Jacky">Payer: Jacky</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="d_share" placeholder="D. Share" class="bg-white/5 border border-white/10 rounded-xl p-3">
                    <input type="number" id="j_share" placeholder="J. Share" class="bg-white/5 border border-white/10 rounded-xl p-3">
                </div>
                <button type="submit" class="w-full btn-premium p-4 rounded-xl font-bold shadow-lg shadow-cyan-500/20">Confirm Transaction</button>
            </form>
        </div>
    </div>

    <script>
        const openModal = () => document.getElementById('modal').classList.remove('hidden');
        const closeModal = () => document.getElementById('modal').classList.add('hidden');

        async function updateUI() {
            try {
                const sumRes = await fetch('/api/get-summary');
                const sumData = await sumRes.json();
                
                document.getElementById('total-savings').innerText = `$${sumData.savings.total.toLocaleString()}`;
                document.getElementById('balance-msg').innerText = sumData.expenses.summary;
                
                const progress = (sumData.savings.total / 1000000 * 100).toFixed(1);
                document.getElementById('save-progress').style.width = `${Math.min(progress, 100)}%`;

                const histRes = await fetch('/api/get-history');
                const histData = await histRes.json();
                const list = document.getElementById('history-list');
                list.innerHTML = '';

                histData.forEach(item => {
                    const html = `
                        <div class="list-item flex justify-between items-center py-4">
                            <div>
                                <p class="font-medium">${item.description}</p>
                                <p class="text-xs text-gray-500">${item.date} · By ${item.payer_name}</p>
                            </div>
                            <div class="text-right">
                                <p class="font-bold text-cyan-400">$${item.amount.toLocaleString()}</p>
                                <p class="text-[10px] text-gray-500">D:${item.daniel_share} / J:${item.jacky_share}</p>
                            </div>
                        </div>`;
                    list.insertAdjacentHTML('beforeend', html);
                });
            } catch (e) { console.error(e); }
        }

        document.getElementById('recordForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                description: document.getElementById('desc').value,
                amount: parseFloat(document.getElementById('amount').value),
                payer_id: document.getElementById('payer').value,
                daniel_share: parseFloat(document.getElementById('d_share').value || 0),
                jacky_share: parseFloat(document.getElementById('j_share').value || 0),
                category: 'General', type: '支出'
            };
            await fetch('/api/add-record', { method: 'POST', body: JSON.stringify(payload) });
            closeModal();
            updateUI();
        };

        updateUI();
    </script>
</body>
</html>
