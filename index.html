<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DanJacky Collaborative Accounting</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <div class="backdrop-glow glow-a"></div>
    <div class="backdrop-glow glow-b"></div>

    <header class="panel header-panel">
      <div>
        <p class="eyebrow">Luxury Expense Board</p>
        <h1>DanJacky</h1>
        <p class="subtitle">Collaborative Accounting · 輕鬆記帳</p>
      </div>
      <button onclick="refreshData()" class="icon-btn" title="Refresh">↻</button>
    </header>

    <section class="panel summary-panel">
      <div class="summary-top">
        <div>
          <p class="label">Total Expense · 本月支出</p>
          <h2 id="totalExpenseDisplay">$0.00</h2>
        </div>
        <div class="chart-wrap">
          <canvas id="expenseChart"></canvas>
        </div>
      </div>

      <div class="budget-row">
        <div class="budget-head">
          <span>Monthly Budget · 預算</span>
          <span id="budgetDisplay">$30,000</span>
        </div>
        <div class="progress-track">
          <div id="budgetProgress" class="progress-bar" style="width:0%"></div>
        </div>
        <p id="budgetPercentage" class="budget-percent">0%</p>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h3>Settlement</h3>
        <span>分帳</span>
      </div>
      <div id="settlementContainer" class="stack">
        <div class="panel muted">Calculating balances...</div>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h3>Spending Journal</h3>
        <span>明細</span>
      </div>
      <div id="memoList" class="stack"></div>
    </section>

    <div class="fab-wrap">
      <button onclick="openModal()" class="fab" title="Add Record">+</button>
    </div>
  </main>

  <div id="addRecordModal" class="modal hidden">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-card" id="modalContent">
      <div class="modal-head">
        <div>
          <h3>Add New Record</h3>
          <p>新增紀錄 · quick input</p>
        </div>
        <button onclick="closeModal()" class="close-btn">✕</button>
      </div>

      <form id="recordForm" onsubmit="handleAddRecord(event)">
        <div class="type-grid">
          <label>
            <input type="radio" name="type" value="支出" checked />
            <span>Expense 支出</span>
          </label>
          <label>
            <input type="radio" name="type" value="收入" />
            <span>Income 收入</span>
          </label>
        </div>

        <label class="field">
          <span>Amount 金額</span>
          <input type="number" name="amount" step="0.01" required placeholder="0.00" />
        </label>

        <label class="field">
          <span>Memo / Description 備註</span>
          <textarea name="description" required placeholder="What was this for?"></textarea>
        </label>

        <label class="field">
          <span>Category 類別</span>
          <select name="category">
            <option value="">Auto Detect 自動判斷</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Utilities">Utilities</option>
            <option value="Shopping">Shopping</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Travel">Travel</option>
            <option value="General">General</option>
          </select>
        </label>

        <div class="two-col">
          <label class="field">
            <span>Payer 付款人</span>
            <select name="payer_id">
              <option value="Daniel">Daniel</option>
              <option value="Jacky">Jacky</option>
            </select>
          </label>

          <label class="field">
            <span>Date 日期</span>
            <input type="date" name="date" required />
          </label>
        </div>

        <button type="submit" class="save-btn">Save Record 儲存</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
