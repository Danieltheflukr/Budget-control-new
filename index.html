<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DanJacky Collaborative Accounting</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-200 font-sans min-h-screen">
    <div class="max-w-md mx-auto p-4 pb-24">
        <header class="flex justify-between items-center mb-6 pt-4">
            <div>
                <h1 class="text-2xl font-bold text-white tracking-tight">DanJacky</h1>
                <p class="text-sm text-slate-400">Collaborative Accounting</p>
            </div>
            <div class="flex gap-3">
                <button onclick="refreshData()" class="glass-btn p-2 rounded-full w-10 h-10 flex items-center justify-center">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </header>

        <section class="mb-6">
            <div class="glass-card p-5 rounded-2xl relative overflow-hidden">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-xs text-slate-400 uppercase tracking-wider font-semibold">Total Expenses</p>
                        <h2 class="text-3xl font-bold text-white mt-1" id="totalExpenseDisplay">$0.00</h2>
                    </div>
                    <div class="w-16 h-16">
                        <canvas id="expenseChart"></canvas>
                    </div>
                </div>

                <div class="mb-2">
                    <div class="flex justify-between text-xs mb-1">
                        <span class="text-slate-400">Monthly Budget</span>
                        <span class="text-white font-medium" id="budgetDisplay">$30,000</span>
                    </div>
                    <div class="w-full bg-slate-800 rounded-full h-2">
                        <div id="budgetProgress" class="bg-gradient-to-r from-blue-500 to-cyan-400 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
                    </div>
                    <p class="text-xs text-right mt-1 text-slate-500" id="budgetPercentage">0%</p>
                </div>
            </div>
        </section>

        <section class="mb-6">
            <h3 class="text-lg font-semibold text-white mb-3 flex items-center">
                <i class="fas fa-hand-holding-usd mr-2 text-cyan-400"></i> Settlement
            </h3>
            <div id="settlementContainer" class="grid grid-cols-1 gap-3">
                <div class="glass-card p-4 rounded-xl text-center text-slate-400 text-sm italic">
                    Calculating balances...
                </div>
            </div>
        </section>

        <section class="mb-6">
            <h3 class="text-lg font-semibold text-white mb-3 flex items-center">
                <i class="fas fa-receipt mr-2 text-cyan-400"></i> Spending Memo
            </h3>
            <div id="memoList" class="space-y-3">
                </div>
        </section>

        <div class="fixed bottom-6 left-0 right-0 flex justify-center z-50 pointer-events-none">
            <button onclick="openModal()" class="pointer-events-auto bg-gradient-to-r from-blue-600 to-cyan-500 text-white w-14 h-14 rounded-full shadow-lg shadow-blue-500/30 flex items-center justify-center transform transition-transform hover:scale-105 active:scale-95">
                <i class="fas fa-plus text-xl"></i>
            </button>
        </div>

        <div id="addRecordModal" class="fixed inset-0 z-[60] hidden">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-md" onclick="closeModal()"></div>
            <div class="absolute bottom-0 left-0 right-0 glass-modal-content rounded-t-3xl p-6 transition-transform duration-300 transform translate-y-full" id="modalContent">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-white">New Record</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-white transition-colors">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>

                <form id="recordForm" onsubmit="handleAddRecord(event)">
                    <div class="grid grid-cols-2 gap-3 mb-4">
                        <label class="cursor-pointer">
                            <input type="radio" name="type" value="支出" checked class="peer sr-only">
                            <div class="p-3 text-center rounded-xl bg-slate-800/50 border border-slate-600/50 peer-checked:bg-red-500/20 peer-checked:border-red-500 peer-checked:text-red-400 transition-all font-medium">
                                Expense
                            </div>
                        </label>
                        <label class="cursor-pointer">
                            <input type="radio" name="type" value="收入" class="peer sr-only">
                            <div class="p-3 text-center rounded-xl bg-slate-800/50 border border-slate-600/50 peer-checked:bg-green-500/20 peer-checked:border-green-500 peer-checked:text-green-400 transition-all font-medium">
                                Income
                            </div>
                        </label>
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs text-slate-400 mb-1 uppercase tracking-wider font-semibold">Amount</label>
                        <input type="number" name="amount" step="0.01" required placeholder="0.00" class="w-full bg-slate-800/50 border border-slate-600/50 rounded-xl p-3 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all text-lg font-bold">
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs text-slate-400 mb-1 uppercase tracking-wider font-semibold">Category</label>
                        <div class="relative">
                            <select name="category" required class="w-full bg-slate-800/50 border border-slate-600/50 rounded-xl p-3 text-white appearance-none focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all">
                                <option value="" disabled selected>Select Category</option>
                                <option value="Food">Food (餐飲)</option>
                                <option value="Transport">Transport (交通)</option>
                                <option value="Shopping">Shopping (購物)</option>
                                <option value="Entertainment">Entertainment (娛樂)</option>
                                <option value="Utilities">Utilities (帳單)</option>
                                <option value="Travel">Travel (旅行)</option>
                                <option value="Other">Other (其他)</option>
                            </select>
                            <div class="absolute right-3 top-3 pointer-events-none text-slate-400">
                                <i class="fas fa-chevron-down"></i>
                            </div>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="block text-xs text-slate-400 mb-1 uppercase tracking-wider font-semibold">Memo / Description</label>
                        <textarea name="description" required placeholder="What was this for?" class="w-full bg-slate-800/50 border border-slate-600/50 rounded-xl p-3 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all h-20"></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div>
                            <label class="block text-xs text-slate-400 mb-1 uppercase tracking-wider font-semibold">Payer</label>
                            <div class="relative">
                                <select name="payer_id" class="w-full bg-slate-800/50 border border-slate-600/50 rounded-xl p-3 text-white appearance-none focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all">
                                    <option value="Daniel">Daniel</option>
                                    <option value="Jacky">Jacky</option>
                                </select>
                                <div class="absolute right-3 top-3 pointer-events-none text-slate-400">
                                    <i class="fas fa-chevron-down"></i>
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs text-slate-400 mb-1 uppercase tracking-wider font-semibold">Date</label>
                            <input type="date" name="date" required class="w-full bg-slate-800/50 border border-slate-600/50 rounded-xl p-3 text-white focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-cyan-500 hover:from-blue-500 hover:to-cyan-400 text-white font-bold py-4 rounded-xl shadow-lg shadow-cyan-500/20 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
                        Save Record
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
