<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Budget-control | Daniel & Jacky</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .btn { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>💰 財務總覽</h1>
    <div id="summary" class="card">載入中...</div>

    <h2>📝 新增支出</h2>
    <form id="recordForm" class="card">
        描述: <input type="text" id="desc" required><br><br>
        金額: <input type="number" id="amount" required><br><br>
        支付者: 
        <select id="payer">
            <option value="Daniel">Daniel</option>
            <option value="Jacky">Jacky</option>
        </select><br><br>
        Daniel 應負擔: <input type="number" id="d_share" value="0"><br>
        Jacky 應負擔: <input type="number" id="j_share" value="0"><br><br>
        <button type="submit" class="btn">提交支出</button>
    </form>

    <script>
        // 自動獲取總覽
        async function fetchSummary() {
            const res = await fetch('/api/get-summary');
            const data = await res.json();
            document.getElementById('summary').innerText = 
                `總儲蓄: $${data.savings.total}\n` +
                `支出狀態: ${data.expenses.summary}`;
        }

        // 提交表單邏輯
        document.getElementById('recordForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                description: document.getElementById('desc').value,
                amount: parseFloat(document.getElementById('amount').value),
                payer_id: document.getElementById('payer').value,
                daniel_share: parseFloat(document.getElementById('d_share').value),
                jacky_share: parseFloat(document.getElementById('j_share').value),
                type: 'expense'
            };
            await fetch('/api/add-record', {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            alert('紀錄成功！');
            fetchSummary();
        };

        fetchSummary();
    </script>
</body>
</html>
