<!doctype html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DanJacky協作記帳本</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap');
    body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
  </style>
</head>
<body class="p-4">
  <div id="app" class="max-w-md mx-auto space-y-4 pb-24">
    
    <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
      <div class="flex justify-between items-center mb-4">
        <h1 class="text-xl font-bold text-slate-800">📊 雲端協作記帳</h1>
        <button onclick="exportToCSV()" class="text-xs bg-indigo-50 text-indigo-600 px-3 py-1 rounded-lg font-bold">匯出 CSV</button>
      </div>
      <div class="space-y-2">
        <div class="flex justify-between text-xs font-bold text-slate-500">
          <span>本月預算 (<span id="total-exp-text">$0</span>)</span>
          <span id="budget-percent-text">0%</span>
        </div>
        <div class="w-full bg-slate-100 rounded-full h-3 overflow-hidden">
          <div id="budget-bar" class="h-full bg-emerald-500 transition-all duration-700" style="width: 0%"></div>
        </div>
      </div>
    </div>

    <!-- Settlement Card -->
    <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200" id="settlement-card">
       <h2 class="text-sm font-bold text-slate-700 mb-2">💰 結算中心 (誰該給誰錢)</h2>
       <div id="settlement-list" class="text-xs space-y-1 text-slate-600">
         載入中...
       </div>
    </div>

    <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
      <div class="h-48 flex justify-center"><canvas id="expenseChart"></canvas></div>
    </div>

    <div id="list-container" class="space-y-2">載入中...</div>

    <div class="fixed bottom-6 left-0 right-0 px-4 text-center">
      <button onclick="toggleForm()" class="max-w-md mx-auto w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-xl active:scale-95 transition-all">+ 新增帳目</button>
    </div>

    <div id="form-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-end sm:items-center justify-center p-4 z-50">
      <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl">
        <form onsubmit="addRecord(event)" class="space-y-4">
          <div class="grid grid-cols-2 gap-2">
            <select id="type" class="bg-slate-50 border-none rounded-xl p-3 text-sm"><option value="支出">💸 支出</option><option value="收入">💰 收入</option></select>
            <select id="member-select" class="bg-slate-50 border-none rounded-xl p-3 text-sm">
                <option value="">選擇成員...</option>
            </select>
          </div>
          <select id="category" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm"><option value="飲食">🍜 飲食</option><option value="交通">🚗 交通</option><option value="購物">🛍️ 購物</option><option value="住宅">🏠 住宅</option><option value="娛樂">🎮 娛樂</option></select>
          <input id="desc" type="text" placeholder="項目描述" required class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm outline-none">
          <input id="amount" type="number" step="0.01" placeholder="金額" required class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm outline-none">
          <div class="flex gap-2">
            <button type="button" onclick="toggleForm()" class="flex-1 py-3 bg-slate-100 rounded-xl text-sm font-bold text-slate-500">取消</button>
            <button type="submit" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl text-sm font-bold">儲存</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    let state = { records: [], members: [], settlement: null, stats: [], budget: 15000 };
    let myChart = null;

    async function loadData() {
      try {
        const [recordsRes, membersRes, settlementRes, statsRes] = await Promise.all([
            fetch('/api/records'),
            fetch('/api/members'),
            fetch('/api/settlement'),
            fetch('/api/stats')
        ]);

        state.records = await recordsRes.json();
        state.members = await membersRes.json();
        state.settlement = await settlementRes.json();
        state.stats = await statsRes.json();

        render();
        renderSettlement();
        renderMembers();
      } catch (err) {
        document.getElementById('list-container').innerHTML = `<p class="text-center text-red-400 py-10">無法連接 D1: ${err.message}</p>`;
      }
    }

    function renderMembers() {
        const select = document.getElementById('member-select');
        select.innerHTML = state.members.map(m => `<option value="${m.id}">${m.name}</option>`).join('');
        if (state.members.length === 0) {
             select.innerHTML = '<option value="Daniel">Daniel</option><option value="Jacky">Jacky</option>';
        }
    }

    function renderSettlement() {
        const container = document.getElementById('settlement-list');
        if (!state.settlement || !state.settlement.balances) {
            container.innerHTML = '無資料';
            return;
        }

        const balances = state.settlement.balances;
        if (balances.length === 0) {
             container.innerHTML = '無成員資料';
             return;
        }

        container.innerHTML = balances.map(b => {
            const bal = parseFloat(b.balance);
            const color = bal >= 0 ? 'text-emerald-500' : 'text-red-500';
            const text = bal >= 0 ? `應收 $${bal.toFixed(0)}` : `應付 $${Math.abs(bal).toFixed(0)}`;
            return `<div class="flex justify-between"><span>${b.name}</span><span class="${color} font-bold">${text}</span></div>`;
        }).join('');
    }

    async function addRecord(e) {
      e.preventDefault();

      const memberSelect = document.getElementById('member-select');
      const selectedMemberId = memberSelect.value;
      const selectedMemberName = memberSelect.options[memberSelect.selectedIndex].text;

      const newRecord = {
        record_id: Date.now().toString(),
        type: document.getElementById('type').value,
        category: document.getElementById('category').value,
        description: document.getElementById('desc').value,
        amount: parseFloat(document.getElementById('amount').value),
        payer_id: selectedMemberId,
        member: selectedMemberName,
        group_id: 'group_default'
      };

      await fetch('/api/records', { method: 'POST', body: JSON.stringify(newRecord) });
      toggleForm();
      loadData();
    }

    async function deleteRecord(id) {
      if (!confirm("確定刪除嗎？")) return;
      await fetch(`/api/records?id=${id}`, { method: 'DELETE' });
      loadData();
    }

    function render() {
      const list = document.getElementById('list-container');
      list.innerHTML = state.records.map(r => `
        <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm">
          <div><p class="text-sm font-bold text-slate-700">${r.description}</p><p class="text-[10px] text-slate-400">${r.category} · ${r.member}</p></div>
          <div class="text-right">
            <p class="font-bold ${r.type === '收入' ? 'text-emerald-500' : 'text-slate-700'}">${r.type === '收入' ? '+' : '-'}$${r.amount}</p>
            <button onclick="deleteRecord('${r.record_id}')" class="text-[10px] text-red-300">刪除</button>
          </div>
        </div>`).join('');
      updateStats();
    }

    function updateStats() {
      const totalExp = state.records.filter(r => r.type === '支出').reduce((a, b) => a + b.amount, 0);
      const percent = Math.min((totalExp / state.budget) * 100, 100);
      document.getElementById('budget-bar').style.width = percent + '%';
      document.getElementById('budget-percent-text').textContent = Math.round(percent) + '%';
      document.getElementById('total-exp-text').textContent = '$' + totalExp;

      let labels = [];
      let data = [];

      if (state.stats && state.stats.length > 0) {
          labels = state.stats.map(s => s.category);
          data = state.stats.map(s => s.value);
      } else {
          const cats = {};
          state.records.filter(r => r.type === '支出').forEach(r => cats[r.category] = (cats[r.category] || 0) + r.amount);
          labels = Object.keys(cats);
          data = Object.values(cats);
      }

      const ctx = document.getElementById('expenseChart').getContext('2d');
      if (myChart) myChart.destroy();
      myChart = new Chart(ctx, { type: 'doughnut', data: { labels: labels, datasets: [{ data: data, backgroundColor: ['#6366f1', '#f43f5e', '#fbbf24', '#10b981', '#8b5cf6'] }] }, options: { plugins: { legend: { position: 'bottom' } } } });
    }

    function toggleForm() { document.getElementById('form-modal').classList.toggle('hidden'); }
    function exportToCSV() {
       const rows = [['Date', 'Type', 'Category', 'Description', 'Amount', 'Member']];
       state.records.forEach(r => {
           rows.push([r.date || '', r.type, r.category, r.description, r.amount, r.member]);
       });
       let csvContent = "data:text/csv;charset=utf-8," + rows.map(e => e.join(",")).join("\n");
       const encodedUri = encodeURI(csvContent);
       const link = document.createElement("a");
       link.setAttribute("href", encodedUri);
       link.setAttribute("download", "transactions.csv");
       document.body.appendChild(link);
       link.click();
    }
    window.onload = loadData;
  </script>
</body>
</html>
